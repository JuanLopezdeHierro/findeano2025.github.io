<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiesta de Fin de Año 2025</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        dark: '#121212',
                        card: '#1E1E1E'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #121212; color: #E0E0E0; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #C5A028 100%); }
        .glass { background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px); }
        /* Animación para el botón de guardar */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .animate-pulse-gold {
            animation: pulse-gold 2s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ⚠️ PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT NUEVA
        const API_URL = 'https://script.google.com/macros/s/AKfycbynd1X7GcM7qUTCZRx9aVUMC6YpfBQJTJCkydse4ILCK6SppVXFn70EmpvPveH9UXia5Q/exec';

        const USERS = ['Juan', 'Quintana', 'Germán', 'Jose', 'Cantero', 'Alejandro', 'David', 'Jorge', 'Arbelo'];
        
        const TASK_CONFIG = {
            alcohol: { icon: '🍷', label: 'Alcohol', desc: 'Bebidas espirituosas y refrescos' },
            musica: { icon: '🎵', label: 'Música', desc: 'Playlist y equipo de sonido' },
            logistica: { icon: '🚚', label: 'Logística', desc: 'Transporte y organización' },
            snacks: { icon: '🍪', label: 'Snacks', desc: 'Aperitivos y picoteo' },
            menaje: { icon: '🍴', label: 'Menaje', desc: 'Vasos, platos, hielo, etc.' }
        };

        function App() {
            const [user, setUser] = React.useState('');
            const [tasks, setTasks] = React.useState({});
            const [loading, setLoading] = React.useState(true);
            const [saving, setSaving] = React.useState(false);
            const [hasChanges, setHasChanges] = React.useState(false); // Nuevo estado para controlar cambios locales
            const [error, setError] = React.useState('');

            // Cargar datos al inicio
            React.useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(API_URL);
                    const data = await response.json();
                    setTasks(data);
                    setHasChanges(false);
                } catch (err) {
                    console.error("Error cargando:", err);
                    setError('Error al cargar datos. Intenta recargar.');
                } finally {
                    setLoading(false);
                }
            };

            // Función MODIFICADA: Ahora solo guarda en local y activa la bandera "hasChanges"
            const saveData = async () => {
                setSaving(true);
                try {
                    // Usamos la estrategia GET con parámetros para evitar CORS
                    const params = new URLSearchParams({
                        action: 'save',
                        data: JSON.stringify(tasks)
                    });
                    
                    const response = await fetch(`${API_URL}?${params.toString()}`);
                    const result = await response.json();
                    
                    if (result.success) {
                        setHasChanges(false); // Reseteamos bandera de cambios
                        // Opcional: Recargar datos para asegurar sincronización
                        // await fetchData(); 
                    } else {
                        throw new Error(result.error || 'Error desconocido');
                    }
                } catch (err) {
                    console.error("Error guardando:", err);
                    alert('Error al guardar. Por favor intenta de nuevo.');
                } finally {
                    setSaving(false);
                }
            };

            const toggleAssignment = (taskId) => {
                if (!user) return alert('Selecciona tu nombre primero');
                
                setTasks(prev => {
                    const current = prev[taskId].assignedTo;
                    const newAssigned = current.includes(user)
                        ? current.filter(u => u !== user)
                        : [...current, user];
                    
                    return {
                        ...prev,
                        [taskId]: { ...prev[taskId], assignedTo: newAssigned }
                    };
                });
                setHasChanges(true); // Marcamos que hay cambios sin guardar
            };

            const handleDetailChange = (taskId, value) => {
                setTasks(prev => ({
                    ...prev,
                    [taskId]: { ...prev[taskId], details: value }
                }));
                setHasChanges(true); // Marcamos que hay cambios sin guardar
            };

            if (loading && !tasks.alcohol) return (
                <div className="min-h-screen flex items-center justify-center text-gold">
                    <div className="text-2xl animate-pulse">Cargando fiesta... ✨</div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 px-4 py-8 max-w-2xl mx-auto font-sans">
                    {/* Header */}
                    <div className="text-center mb-8">
                        <h1 className="text-4xl font-bold text-gold mb-2 tracking-wider">FIN DE AÑO 2025</h1>
                        <p className="text-gray-400 text-sm tracking-widest uppercase">Organizador de Etiqueta</p>
                    </div>

                    {/* Selector de Usuario */}
                    <div className="mb-8 bg-card p-4 rounded-xl border border-gray-800 shadow-lg">
                        <label className="block text-gray-400 text-xs uppercase tracking-wider mb-2">Soy:</label>
                        <select 
                            value={user} 
                            onChange={(e) => setUser(e.target.value)}
                            className="w-full bg-dark text-white p-3 rounded-lg border border-gray-700 focus:border-gold focus:outline-none transition-colors"
                        >
                            <option value="">Selecciona tu nombre...</option>
                            {USERS.map(u => <option key={u} value={u}>{u}</option>)}
                        </select>
                    </div>

                    {/* Lista de Tareas */}
                    <div className="space-y-4">
                        {Object.entries(tasks).map(([key, task]) => (
                            <div key={key} className="bg-card rounded-xl overflow-hidden border border-gray-800 shadow-lg transition-all hover:border-gray-700">
                                <div className="p-4">
                                    <div className="flex items-start justify-between mb-3">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">{TASK_CONFIG[key].icon}</span>
                                            <div>
                                                <h3 className="font-bold text-lg text-gray-200">{TASK_CONFIG[key].label}</h3>
                                                <p className="text-xs text-gray-500">{TASK_CONFIG[key].desc}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => toggleAssignment(key)}
                                            className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-300 ${
                                                task.assignedTo.includes(user)
                                                ? 'bg-gold text-dark hover:bg-white'
                                                : 'bg-gray-800 text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            {task.assignedTo.includes(user) ? 'Apuntado ✓' : 'Apuntarme'}
                                        </button>
                                    </div>

                                    {/* Responsables */}
                                    <div className="mb-3 flex flex-wrap gap-2">
                                        {task.assignedTo.length > 0 ? (
                                            task.assignedTo.map(person => (
                                                <span key={person} className="bg-gray-800 text-gray-300 text-xs px-2 py-1 rounded border border-gray-700">
                                                    {person}
                                                </span>
                                            ))
                                        ) : (
                                            <span className="text-gray-600 text-xs italic">Sin responsables aún</span>
                                        )}
                                    </div>

                                    {/* Detalles (Textarea) */}
                                    <textarea
                                        value={task.details}
                                        onChange={(e) => handleDetailChange(key, e.target.value)}
                                        placeholder={`Detalles sobre ${TASK_CONFIG[key].label.toLowerCase()}...`}
                                        className="w-full bg-dark text-sm text-gray-300 p-3 rounded-lg border border-gray-800 focus:border-gold focus:outline-none transition-colors resize-none h-20"
                                    />
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* BOTÓN FLOTANTE DE GUARDAR - Solo visible si hay cambios o está guardando */}
                    <div className="fixed bottom-6 left-0 right-0 px-4 flex justify-center z-50">
                        {hasChanges && (
                            <button
                                onClick={saveData}
                                disabled={saving}
                                className={`
                                    flex items-center gap-2 px-8 py-4 rounded-full font-bold shadow-2xl text-dark text-lg
                                    transform transition-all duration-300 hover:scale-105
                                    ${saving ? 'bg-gray-400 cursor-wait' : 'gold-gradient animate-pulse-gold cursor-pointer'}
                                `}
                            >
                                {saving ? (
                                    <>⏳ Guardando...</>
                                ) : (
                                    <>💾 Guardar Cambios</>
                                )}
                            </button>
                        )}
                        
                        {/* Botón de recargar (siempre visible pero discreto si no hay cambios) */}
                        {!hasChanges && !loading && (
                            <button
                                onClick={fetchData}
                                className="bg-gray-800 text-gray-400 px-6 py-3 rounded-full text-sm border border-gray-700 shadow-xl flex items-center gap-2 hover:bg-gray-700 hover:text-white transition-all"
                            >
                                🔄 Ver si hay novedades
                            </button>
                        )}
                    </div>
                    
                    {error && (
                        <div className="fixed top-4 left-4 right-4 bg-red-900/90 text-white p-3 rounded-lg text-center text-sm border border-red-500">
                            {error}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
