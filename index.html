<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiesta de Fin de Año 2025</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        dark: '#121212',
                        card: '#1E1E1E',
                        cardhover: '#252525'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #121212; color: #E0E0E0; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #C5A028 100%); }
        /* Animación suave para el candado */
        .fade-enter { opacity: 0; }
        .fade-enter-active { opacity: 1; transition: opacity 300ms; }
        /* Scrollbar personalizada */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #121212; }
        textarea::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ⚠️ ASEGÚRATE DE QUE ESTA URL ES LA CORRECTA DE TU PROYECTO
        const API_URL = 'https://script.google.com/macros/s/AKfycbynd1X7GcM7qUTCZRx9aVUMC6YpfBQJTJCkydse4ILCK6SppVXFn70EmpvPveH9UXia5Q/exec';

        const USERS = ['Juan', 'Quintana', 'Germán', 'Jose', 'Cantero', 'Alejandro', 'David', 'Jorge', 'Arbelo'];
        
        // Configuración específica por tarea
        const TASK_CONFIG = {
            alcohol: { 
                icon: '🍷', 
                label: 'Alcohol', 
                desc: 'Bebidas y mezclas',
                type: 'alcohol', // Para lógica específica
                options: ['Vodka', 'Ron', 'Ginebra', 'Whisky', 'Tequila', 'Coca-Cola', 'Sprite', 'Tónica', 'Hielo'],
                unit: 'ml/L'
            },
            musica: { 
                icon: '🎵', 
                label: 'Música', 
                desc: 'Playlist y sonido',
                type: 'music',
                options: ['Altavoz Bluetooth', 'Mesa de mezclas', 'Micrófono', 'Cable Aux', 'Playlist Spotify'],
                unit: 'info'
            },
            logistica: { 
                icon: '🚚', 
                label: 'Logística', 
                desc: 'Transporte y cargas',
                type: 'generic',
                options: [],
                unit: 'personas/kg'
            },
            snacks: { 
                icon: '🍪', 
                label: 'Snacks', 
                desc: 'Picoteo vario',
                type: 'snacks',
                options: ['Munchitos', 'Gusanitos', 'Papas Lays', 'Doritos', 'Aceitunas', 'Frutos Secos', 'Gominolas'],
                unit: 'bolsas'
            },
            menaje: { 
                icon: '🍴', 
                label: 'Menaje', 
                desc: 'Material de consumo',
                type: 'generic',
                options: ['Vasos tubo', 'Vasos chupito', 'Platos', 'Servilletas', 'Tenedores'],
                unit: 'unidades'
            }
        };

        function App() {
            const [user, setUser] = React.useState('');
            const [tasks, setTasks] = React.useState({});
            const [loading, setLoading] = React.useState(true);
            const [saving, setSaving] = React.useState(false);
            const [hasChanges, setHasChanges] = React.useState(false);
            const [error, setError] = React.useState('');
            
            // Estado para los inputs temporales de añadir items
            const [tempInputs, setTempInputs] = React.useState({});

            React.useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(API_URL);
                    const data = await response.json();
                    setTasks(data);
                    setHasChanges(false);
                } catch (err) {
                    console.error("Error cargando:", err);
                    setError('Error de conexión. Recarga la página.');
                } finally {
                    setLoading(false);
                }
            };

            const saveData = async () => {
                setSaving(true);
                try {
                    const params = new URLSearchParams({
                        action: 'save',
                        data: JSON.stringify(tasks)
                    });
                    const response = await fetch(`${API_URL}?${params.toString()}`);
                    const result = await response.json();
                    
                    if (result.success) {
                        setHasChanges(false);
                    } else {
                        throw new Error(result.error || 'Error desconocido');
                    }
                } catch (err) {
                    alert('Error al guardar. Intenta de nuevo.');
                } finally {
                    setSaving(false);
                }
            };

            const toggleAssignment = (taskId) => {
                if (!user) return alert('⚠️ Selecciona tu nombre arriba primero');
                
                setTasks(prev => {
                    const current = prev[taskId].assignedTo;
                    const newAssigned = current.includes(user)
                        ? current.filter(u => u !== user)
                        : [...current, user];
                    
                    return {
                        ...prev,
                        [taskId]: { ...prev[taskId], assignedTo: newAssigned }
                    };
                });
                setHasChanges(true);
            };

            const handleDetailChange = (taskId, value) => {
                setTasks(prev => ({
                    ...prev,
                    [taskId]: { ...prev[taskId], details: value }
                }));
                setHasChanges(true);
            };

            // Función para añadir items desde los desplegables
            const addItem = (taskId, config) => {
                const inputs = tempInputs[taskId] || {};
                const item = inputs.item || (config.options[0] || '');
                const qty = inputs.qty || '';

                if (!item) return;

                const textToAdd = `• ${item}: ${qty} ${config.unit !== 'info' ? config.unit : ''}`;
                
                // Añadimos al texto existente con un salto de línea
                const currentDetails = tasks[taskId].details || '';
                const newDetails = currentDetails ? `${currentDetails}\n${textToAdd}` : textToAdd;

                handleDetailChange(taskId, newDetails);
                
                // Limpiar inputs
                setTempInputs(prev => ({
                    ...prev, 
                    [taskId]: { ...prev[taskId], qty: '' } 
                }));
            };

            const updateTempInput = (taskId, field, value) => {
                setTempInputs(prev => ({
                    ...prev,
                    [taskId]: { ...prev[taskId] || {}, [field]: value }
                }));
            };

            if (loading && !tasks.alcohol) return (
                <div className="min-h-screen flex items-center justify-center text-gold bg-dark">
                    <div className="text-xl animate-pulse">Cargando datos...</div>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 px-4 py-8 max-w-2xl mx-auto font-sans bg-dark">
                    <div className="text-center mb-8">
                        <h1 className="text-3xl font-bold text-gold mb-1">FIN DE AÑO 2025</h1>
                        <p className="text-gray-500 text-xs tracking-widest uppercase">Planning Oficial</p>
                    </div>

                    <div className="mb-6 bg-card p-4 rounded-xl border border-gray-800">
                        <label className="block text-gold text-xs font-bold uppercase mb-2">👤 Identifícate:</label>
                        <select 
                            value={user} 
                            onChange={(e) => setUser(e.target.value)}
                            className="w-full bg-dark text-white p-3 rounded-lg border border-gray-700 focus:border-gold outline-none"
                        >
                            <option value="">Selecciona tu nombre...</option>
                            {USERS.map(u => <option key={u} value={u}>{u}</option>)}
                        </select>
                    </div>

                    <div className="space-y-4">
                        {Object.entries(tasks).map(([key, task]) => {
                            const config = TASK_CONFIG[key];
                            const isAssigned = task.assignedTo.includes(user);
                            const inputs = tempInputs[key] || {};
                            const defaultOption = config.options.length > 0 ? config.options[0] : '';

                            return (
                                <div key={key} className={`rounded-xl border transition-all duration-300 ${isAssigned ? 'bg-card border-gray-600 shadow-lg' : 'bg-dark border-gray-800 opacity-90'}`}>
                                    <div className="p-4">
                                        {/* Cabecera Tarea */}
                                        <div className="flex items-start justify-between mb-4">
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl">{config.icon}</span>
                                                <div>
                                                    <h3 className={`font-bold text-lg ${isAssigned ? 'text-white' : 'text-gray-400'}`}>{config.label}</h3>
                                                    
                                                    {/* Lista de responsables */}
                                                    <div className="flex flex-wrap gap-1 mt-1">
                                                        {task.assignedTo.map(p => (
                                                            <span key={p} className="text-[10px] bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded border border-gray-600">
                                                                {p}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => toggleAssignment(key)}
                                                className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${
                                                    isAssigned 
                                                    ? 'bg-red-900/50 text-red-200 border border-red-800 hover:bg-red-900' 
                                                    : 'bg-gold text-dark hover:bg-white'
                                                }`}
                                            >
                                                {isAssigned ? 'Salir' : 'Apuntarme'}
                                            </button>
                                        </div>

                                        {/* Área de Edición (Condicional) */}
                                        {isAssigned ? (
                                            <div className="space-y-3 animate-fade-in">
                                                
                                                {/* GENERADOR DE ITEMS (Desplegables) */}
                                                <div className="bg-dark/50 p-2 rounded-lg border border-gray-700 flex gap-2 items-end">
                                                    <div className="flex-1">
                                                        <label className="text-[10px] text-gray-500 uppercase block mb-1">Item</label>
                                                        {config.options.length > 0 ? (
                                                            <select 
                                                                className="w-full bg-card text-sm text-gray-300 p-1.5 rounded border border-gray-600 outline-none focus:border-gold"
                                                                onChange={(e) => updateTempInput(key, 'item', e.target.value)}
                                                                value={inputs.item || defaultOption}
                                                            >
                                                                {config.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                            </select>
                                                        ) : (
                                                            <input 
                                                                type="text" 
                                                                placeholder="Nombre del item..."
                                                                className="w-full bg-card text-sm text-gray-300 p-1.5 rounded border border-gray-600 outline-none focus:border-gold"
                                                                onChange={(e) => updateTempInput(key, 'item', e.target.value)}
                                                                value={inputs.item || ''}
                                                            />
                                                        )}
                                                    </div>
                                                    
                                                    <div className="w-24">
                                                        <label className="text-[10px] text-gray-500 uppercase block mb-1">Cant. ({config.unit})</label>
                                                        <input 
                                                            type="text" 
                                                            placeholder="0"
                                                            className="w-full bg-card text-sm text-gray-300 p-1.5 rounded border border-gray-600 outline-none focus:border-gold"
                                                            onChange={(e) => updateTempInput(key, 'qty', e.target.value)}
                                                            value={inputs.qty || ''}
                                                        />
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={() => addItem(key, config)}
                                                        className="bg-gray-700 hover:bg-gold hover:text-dark text-white p-1.5 rounded border border-gray-600 transition-colors"
                                                    >
                                                        ➕
                                                    </button>
                                                </div>

                                                {/* Textarea (editable manual también) */}
                                                <textarea
                                                    value={task.details}
                                                    onChange={(e) => handleDetailChange(key, e.target.value)}
                                                    className="w-full bg-dark text-sm text-gray-300 p-3 rounded-lg border border-gray-700 focus:border-gold outline-none h-24 font-mono leading-relaxed"
                                                    placeholder="Usa los controles de arriba o escribe aquí..."
                                                />
                                            </div>
                                        ) : (
                                            /* Mensaje de Bloqueo */
                                            <div className="bg-dark/30 p-3 rounded-lg border border-dashed border-gray-700 text-center">
                                                <p className="text-gray-500 text-xs flex items-center justify-center gap-2">
                                                    🔒 Apúntate para gestionar {config.label.toLowerCase()}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Botón Guardar Flotante */}
                    {hasChanges && (
                        <div className="fixed bottom-6 left-0 right-0 px-4 flex justify-center z-50">
                            <button
                                onClick={saveData}
                                disabled={saving}
                                className={`
                                    flex items-center gap-2 px-8 py-4 rounded-full font-bold shadow-2xl text-dark text-lg
                                    transition-all duration-300 hover:scale-105 border-2 border-white/20
                                    ${saving ? 'bg-gray-400' : 'gold-gradient animate-pulse'}
                                `}
                            >
                                {saving ? '⏳ Guardando...' : '💾 GUARDAR CAMBIOS'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
